<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ERB Auto-Approve</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
        --accent-off: #6b7280;
        --border: #dbe4f0;
      }

      body {
        margin: 0;
        min-width: 280px;
        font: 14px/1.45 "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 40%),
          linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      }

      main {
        padding: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-top: 14px;
      }

      .toggle-copy {
        flex: 1;
        min-width: 0;
      }

      .toggle-copy strong {
        display: block;
        margin-bottom: 2px;
        font-size: 13px;
        letter-spacing: 0.01em;
      }

      .toggle-copy p {
        max-width: 170px;
      }

      .switchShell {
        position: relative;
        display: inline-flex;
        flex: 0 0 auto;
        width: 54px;
        height: 32px;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .switchInput {
        position: absolute;
        inset: 0;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }

      .switchTrack {
        position: relative;
        width: 54px;
        height: 32px;
        box-sizing: border-box;
        border: 1px solid #c7d2e3;
        background: #e7edf5;
        border-radius: 999px;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
        transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .switchKnob {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 24px;
        height: 24px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border-radius: 50%;
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.14),
          0 6px 14px rgba(15, 23, 42, 0.12);
        transition: transform 0.22s ease;
      }

      .switchInput:checked + .switchTrack {
        background: var(--accent);
        border-color: var(--accent);
        box-shadow:
          inset 0 1px 2px rgba(15, 23, 42, 0.08),
          0 0 0 4px rgba(15, 118, 110, 0.12);
      }

      .switchInput:checked + .switchTrack .switchKnob {
        transform: translateX(20px);
      }

      .switchInput:focus-visible + .switchTrack {
        outline: none;
        box-shadow:
          inset 0 1px 2px rgba(15, 23, 42, 0.08),
          0 0 0 4px rgba(15, 118, 110, 0.16);
      }

      .meta {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .meta strong,
      .meta span {
        display: block;
      }

      .meta strong {
        margin-bottom: 4px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        flex: 1;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        border-radius: 10px;
        padding: 9px 10px;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      #status {
        margin-top: 10px;
        min-height: 20px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>ERB Auto-Approve</h1>
        <p>Approve All first, then fallback to individual Approve.</p>

        <div class="row">
          <div class="toggle-copy">
            <strong>Auto-approve</strong>
            <p id="toggleLabel">Loading...</p>
          </div>
          <label class="switchShell">
            <input id="enabledToggle" class="switchInput" type="checkbox" aria-label="Toggle auto approve">
            <span class="switchTrack" aria-hidden="true">
              <span class="switchKnob"></span>
            </span>
          </label>
        </div>

        <div class="row">
          <div class="toggle-copy">
            <strong>Debug Logs</strong>
            <p id="debugLabel">Loading...</p>
          </div>
          <label class="switchShell">
            <input id="debugToggle" class="switchInput" type="checkbox" aria-label="Toggle debug logs">
            <span class="switchTrack" aria-hidden="true">
              <span class="switchKnob"></span>
            </span>
          </label>
        </div>

        <div class="meta">
          <strong>Last approved</strong>
          <span id="lastApprovedAt">-</span>
        </div>

        <div class="actions">
          <button id="refreshButton">Refresh</button>
          <button id="clearButton" class="primary">Clear Time</button>
        </div>

        <div id="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
